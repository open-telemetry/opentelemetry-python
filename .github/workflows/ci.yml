# Do not edit this file.
# This file is generated automatically by executing tox -e generate-workflows

name: CI

on:
  push:
    branches:
    - 'main'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  misc:
    uses: ./.github/workflows/misc.yml
  lint:
    uses: ./.github/workflows/lint.yml
  tests:
    uses: ./.github/workflows/test.yml
  contrib:
    uses: open-telemetry/opentelemetry-python-contrib/.github/workflows/core_contrib_test.yml@release/v1.41.x-0.62bx
    with:
      CORE_REPO_SHA: ${{ github.sha }}
      CONTRIB_REPO_SHA: ${{ github.event_name == 'pull_request' && (
          contains(github.event.pull_request.labels.*.name, 'prepare-release') && github.event.pull_request.head.ref ||
          contains(github.event.pull_request.labels.*.name, 'backport') && github.event.pull_request.base.ref ||
          'main'
        ) || 'main' }}

  check:
    if: always()
    needs:
      - misc
      - lint
      - tests
      - contrib
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
