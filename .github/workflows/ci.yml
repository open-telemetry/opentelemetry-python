# Do not edit this file.
# This file is generated automatically by executing tox -e generate-workflows

name: CI

on:
  push:
    branches:
    - 'main'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:

  misc_0:
    uses: ./.github/workflows/misc_0.yml

  lint_0:
    uses: ./.github/workflows/lint_0.yml

  tests_0:
    uses: ./.github/workflows/test_0.yml

  tests_1:
    uses: ./.github/workflows/test_1.yml

  contrib_0:
    uses: open-telemetry/opentelemetry-python-contrib/.github/workflows/core_contrib_test_0.yml@main
    with:
      CORE_REPO_SHA: ${{ github.sha }}
      CONTRIB_REPO_SHA: ${{ github.event_name == 'pull_request' && (
          contains(github.event.pull_request.labels.*.name, 'prepare-release') && github.event.pull_request.head.ref ||
          contains(github.event.pull_request.labels.*.name, 'backport') && github.event.pull_request.base.ref ||
          'main'
        ) || 'main' }}

  check:
    if: always()
    needs:
      - misc_0
      - lint_0
      - tests_0
      - tests_1
      - contrib_0
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          allowed-failures: ""
          allowed-skips: ""
          jobs: ${{ toJSON(needs) }}
