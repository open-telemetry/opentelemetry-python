# =============================================================================
# Release workflow
# =============================================================================
#
# Purpose: publishes a release. It builds wheels for every package in this
# repo, uploads them to PyPI (via a TestPyPI dry run first), and creates the
# corresponding GitHub release with release notes pulled straight out of
# CHANGELOG.md.
#
# This is the LAST of this repo's 3 release workflows to run, and it must be
# triggered manually (workflow_dispatch) on a "release/*" branch -- never on
# main. The full release pipeline looks like this:
#
#   1. prepare-release-branch.yml -- run on main. Cuts a new release branch
#      (e.g. release/v1.45.x-0.66bx) and opens a pull request *against that
#      new branch* which bumps repo.toml/pyproject.toml/version files to the
#      version being released and updates CHANGELOG.md. A human reviews and
#      merges that PR into the release branch.
#   2. release.yml (this file) -- run manually on the release branch, once
#      the PR from step 1 (or step 3, for a patch) has been merged. Actually
#      publishes the release described by the branch's current version.
#   3. prepare-patch-release.yml -- for a later patch release on the SAME
#      release branch (e.g. 1.44.0 -> 1.44.1), run this first to open a PR
#      that bumps the version/changelog again. Once merged, go back to step
#      2 to publish the patch.
#
# This workflow handles both cases -- "first release on this branch" (patch
# number 0) and "patch release" (patch number > 0) -- by reading the version
# already committed to repo.toml (via scripts/release/print_version.py) and
# checking whether the patch number is 0. It refuses to run unless
# CHANGELOG.md already documents the version being released, which is this
# workflow's way of confirming the PR from step 1/3 was actually merged
# before it starts building and publishing anything.
# =============================================================================
name: Release
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write # required for creating GitHub releases
    runs-on: ubuntu-latest
    steps:
      # Guard rail: this job publishes real packages to PyPI and creates a
      # real GitHub release, so it must never run against main or a feature
      # branch by accident. GITHUB_REF_NAME is the branch that was selected
      # when this workflow was manually triggered.
      - run: |
          if [[ $GITHUB_REF_NAME != release/* ]]; then
            echo this workflow should only be run against release branches
            exit 1
          fi

      # Checks out the release branch at the commit that triggered this run
      # (i.e. GITHUB_REF_NAME, whatever the operator selected when starting
      # the workflow).
      - uses: actions/checkout@v4

      # scripts/release/print_version.py needs tomlkit to parse repo.toml.
      - name: Install tomlkit
        run: pip install tomlkit

      # Reads the version repo.toml is currently set to on this branch --
      # which prepare-release-branch.yml or prepare-patch-release.yml
      # already bumped to the version being released -- and works out
      # whether this is the first release on this branch (stable patch
      # number == 0) or a patch release (patch number > 0).
      - name: Set environment variables
        run: |
          stable_version=$(./scripts/release/print_version.py --stable)
          unstable_version=$(./scripts/release/print_version.py --unstable)

          # Split e.g. "1.44.1" into stable_major=1 stable_minor=44
          # stable_patch=1 via a regex capture group match.
          if [[ $stable_version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            stable_major="${BASH_REMATCH[1]}"
            stable_minor="${BASH_REMATCH[2]}"
            stable_patch="${BASH_REMATCH[3]}"
          else
            echo "unexpected stable_version: $stable_version"
            exit 1
          fi
          # A non-zero patch number means this is a patch release (e.g.
          # 1.44.1, not 1.44.0): work out PRIOR_VERSION_WHEN_PATCH, the
          # exact version being patched, one patch number back on both the
          # stable and unstable tracks. This is only used later to word the
          # release notes ("this is a patch release on the previous X
          # release, fixing...").
          if [[ $stable_patch != 0 ]]; then
            if [[ $unstable_version =~ ^0\.([0-9]+)b([0-9]+)$ ]]; then
              unstable_minor="${BASH_REMATCH[1]}"
              unstable_patch="${BASH_REMATCH[2]}"
            else
              echo "unexpected unstable_version: $unstable_version"
              exit 1
            fi
            if [[ $unstable_patch != 0 ]]; then
              prior_version_when_patch="$stable_major.$stable_minor.$((stable_patch - 1))/0.${unstable_minor}b$((unstable_patch - 1))"
            fi
          fi

          # $GITHUB_ENV persists these as env vars for every later step in
          # this job.
          echo "STABLE_VERSION=$stable_version" >> $GITHUB_ENV
          echo "UNSTABLE_VERSION=$unstable_version" >> $GITHUB_ENV

          # Empty string when this isn't a patch release; later steps treat
          # "is this variable non-empty" as the patch-release check.
          echo "PRIOR_VERSION_WHEN_PATCH=$prior_version_when_patch" >> $GITHUB_ENV

      # Refuses to publish unless CHANGELOG.md already has a "## Version
      # X/Y" section for the version being released. That section only
      # exists once the PR opened by prepare-release-branch.yml (or
      # prepare-patch-release.yml, for a patch) has actually been merged
      # into this branch, so this is the check that catches "someone ran
      # this workflow before merging that PR".
      - run: |
          if [[ -z $PRIOR_VERSION_WHEN_PATCH ]]; then
            # not making a patch release
            if ! grep --quiet "^## Version ${STABLE_VERSION}/${UNSTABLE_VERSION} " CHANGELOG.md; then
              echo the pull request generated by prepare-release-branch.yml needs to be merged first
              exit 1
            fi
          fi

      # check out main branch to verify there won't be problems with merging the change log
      # at the end of this workflow
      #
      # (Note this file doesn't contain a later step that merges anything
      # into main -- the changelog backport for patch releases is instead a
      # separate PR opened by prepare-patch-release.yml's own "Backport
      # patch release changelog to main" step. This checkout appears to be a
      # pre-flight sanity check, run before the expensive wheel-build/
      # publish steps below, though a plain `actions/checkout` doesn't
      # itself merge anything, so it's unclear what failure mode it would
      # actually catch.)
      - uses: actions/checkout@v4
        with:
          ref: main

        # back to the release branch
      - uses: actions/checkout@v4

        # next few steps publish to pypi
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Builds sdists/wheels for every package into ./dist, via tox (see
      # scripts/build.sh).
      - name: Build wheels
        run: ./scripts/build.sh

      - name: Install twine
        run: |
          pip install twine

      # The step below publishes to testpypi in order to catch any issues
      # with the package configuration that would cause a failure to upload
      # to pypi. One example of such a failure is if a classifier is
      # rejected by pypi (e.g "3 - Beta"). This would cause a failure during the
      # middle of the package upload causing the action to fail, and certain packages
      # might have already been updated, this would be bad.
      #
      # --skip-existing makes this (and the real PyPI upload below) safe to
      # re-run: if a package version was already uploaded in a prior,
      # partially-failed run, twine won't error out trying to re-upload it.
      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.test_pypi_token }}
        run: |
          twine upload --repository testpypi --skip-existing --verbose dist/*

      # The real, production PyPI upload. Only reached if the TestPyPI dry
      # run above succeeded.
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.pypi_password }}
        run: |
          twine upload --skip-existing --verbose dist/*

      # Builds /tmp/release-notes.txt, the body of the GitHub release
      # created in the next step, out of CHANGELOG.md.
      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # conditional block not indented because of the heredoc
          #
          # For a patch release, prefixes the release notes with a sentence
          # naming the version being patched (computed above as
          # PRIOR_VERSION_WHEN_PATCH).
          if [[ ! -z $PRIOR_VERSION_WHEN_PATCH ]]; then
          cat > /tmp/release-notes.txt << EOF
          This is a patch release on the previous $PRIOR_VERSION_WHEN_PATCH release, fixing the issue(s) below.

          EOF
          fi

          # CHANGELOG_SECTION.md is also used at the end of the release workflow
          # for copying the change log updates to main
          #
          # Extracts just this version's section out of CHANGELOG.md: sed
          # deletes everything up to and including the "## Version X/Y "
          # heading line, then stops (quits) at the next "## Version" line,
          # printing everything in between.
          sed -n "0,/^## Version ${STABLE_VERSION}\/${UNSTABLE_VERSION} /d;/^## Version /q;p" CHANGELOG.md \
            > /tmp/CHANGELOG_SECTION.md

          # the complex perl regex is needed because markdown docs render newlines as soft wraps
          # while release notes render them as line breaks
          #
          # Appends the extracted section to release-notes.txt, collapsing
          # markdown's soft-wrapped lines (a blank-line-free paragraph split
          # across multiple lines) into single lines, but leaving actual
          # blank lines and list items (bullets, numbered items) alone, so
          # GitHub's release notes renderer doesn't show stray line breaks
          # in the middle of a sentence.
          perl -0pe 's/(?<!\n)\n *(?!\n)(?![-*] )(?![1-9]+\. )/ /g' /tmp/CHANGELOG_SECTION.md \
            >> /tmp/release-notes.txt

      # Creates the actual GitHub release: tags the current commit
      # v$STABLE_VERSION, titles the release "Version X/Y" (both the stable
      # and unstable version numbers, since this repo ships both together),
      # and attaches the notes generated above.
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create --target $GITHUB_REF_NAME \
                            --title "Version ${STABLE_VERSION}/${UNSTABLE_VERSION}" \
                            --notes-file /tmp/release-notes.txt \
                            --discussion-category announcements \
                            v$STABLE_VERSION
