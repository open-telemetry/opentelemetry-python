receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-python-e2e
          scrape_interval: 1s
          static_configs:
            - targets: ['host.docker.internal:9464']

exporters:
  otlphttp:
    endpoint: http://host.docker.internal:4319

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      exporters: [otlphttp]
    metrics/prometheus:
      receivers: [prometheus]
      exporters: [otlphttp]
    logs:
      receivers: [otlp]
      exporters: [otlphttp]
